<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Dashboard Backend – Test</title>
  <!-- 1. Supabase JS (must load before dashboardService.js) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <!-- 2. Dashboard service -->
  <script src="dashboardService.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', system-ui, sans-serif; background: #0a0a12; color: #f0eeff; padding: 2rem; }
    h1 { margin-bottom: 0.5rem; font-size: 1.4rem; }
    .subtitle { color: #9d9abf; margin-bottom: 2rem; font-size: 0.9rem; }
    .section { background: #14142a; border: 1px solid rgba(108,60,225,0.2); border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem; }
    .section h2 { font-size: 1rem; color: #8b5cf6; margin-bottom: 1rem; display: flex; align-items: center; gap: 0.5rem; }
    pre { background: #0f0f1e; border-radius: 8px; padding: 1rem; overflow-x: auto; font-size: 0.82rem; line-height: 1.6; color: #c4b5fd; white-space: pre-wrap; word-break: break-word; }
    .status { padding: 0.6rem 1rem; border-radius: 8px; font-size: 0.85rem; margin-bottom: 1.5rem; }
    .status.ok  { background: rgba(34,197,94,0.15);  color: #22c55e; border: 1px solid rgba(34,197,94,0.3); }
    .status.err { background: rgba(239,68,68,0.15);  color: #ef4444; border: 1px solid rgba(239,68,68,0.3); }
    .status.wait{ background: rgba(0,212,255,0.1);   color: #00d4ff; border: 1px solid rgba(0,212,255,0.25); }
    button { background: #6c3ce1; color: white; border: none; padding: 0.65rem 1.4rem; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.85rem; }
    button:hover { background: #5229c4; }
    button:active { transform: scale(0.97); }
    .btn-row { margin-bottom: 1.5rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .kpi-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 1rem; margin-bottom: 1rem; }
    .kpi-card { background: #0f0f1e; border-radius: 10px; padding: 1rem; border: 1px solid rgba(108,60,225,0.15); }
    .kpi-label { font-size: 0.72rem; color: #9d9abf; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 0.35rem; }
    .kpi-value { font-size: 1.6rem; font-weight: 700; color: #e9e3ff; }
    .kpi-sub   { font-size: 0.75rem; color: #6c3ce1; margin-top: 0.2rem; }
    .bar-chart { display: flex; align-items: flex-end; gap: 3px; height: 80px; margin-bottom: 0.5rem; }
    .bar { flex: 1; background: #6c3ce1; border-radius: 3px 3px 0 0; min-height: 2px; transition: background 0.2s; }
    .bar:hover { background: #8b5cf6; }
    .bar-labels { display: flex; gap: 3px; overflow: hidden; }
    .bar-label { flex: 1; font-size: 0.6rem; color: #6b6990; text-align: center; white-space: nowrap; overflow: hidden; text-overflow: clip; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th { text-align: left; color: #9d9abf; font-weight: 600; padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(108,60,225,0.2); }
    td { padding: 0.5rem 0.75rem; border-bottom: 1px solid rgba(255,255,255,0.04); color: #d0caf5; }
    tr:last-child td { border-bottom: none; }
    .badge { display: inline-block; padding: 0.2rem 0.5rem; border-radius: 4px; font-size: 0.72rem; font-weight: 600; }
    .badge-green  { background: rgba(34,197,94,0.15);  color: #22c55e; }
    .badge-red    { background: rgba(239,68,68,0.15);  color: #ef4444; }
    .badge-yellow { background: rgba(234,179,8,0.15);  color: #eab308; }
    .badge-gray   { background: rgba(148,163,184,0.15); color: #94a3b8; }
    .loading { color: #6b6990; font-style: italic; }
    .error-msg { color: #ef4444; font-size: 0.85rem; }
  </style>
</head>
<body>

<h1>🧪 Dashboard Backend – Testseite</h1>
<p class="subtitle">Prüft ob alle Funktionen korrekt mit Supabase kommunizieren.</p>

<div class="status wait" id="auth-status">⏳ Prüfe Anmeldung...</div>

<div class="btn-row">
  <button onclick="loadAll()">▶ ALLE laden</button>
  <button onclick="loadKPIs()">KPIs</button>
  <button onclick="loadUsage()">Usage Chart</button>
  <button onclick="loadCalls()">Anrufliste</button>
  <button onclick="loadRawJSON()">Raw JSON</button>
</div>

<!-- KPIs -->
<div class="section" id="section-kpis" style="display:none">
  <h2>📊 Dashboard KPIs – dieser Monat</h2>
  <div class="kpi-grid" id="kpi-grid"></div>
  <div id="kpi-error" class="error-msg"></div>
</div>

<!-- Usage Chart -->
<div class="section" id="section-usage" style="display:none">
  <h2>📈 Anrufe über Zeit (letzte 30 Tage)</h2>
  <div class="bar-chart" id="bar-chart"></div>
  <div class="bar-labels" id="bar-labels"></div>
  <div id="usage-summary" style="margin-top:0.75rem; font-size:0.82rem; color:#9d9abf;"></div>
  <div id="usage-error" class="error-msg"></div>
</div>

<!-- Anrufliste -->
<div class="section" id="section-calls" style="display:none">
  <h2>📞 Letzte Anrufe</h2>
  <div id="calls-table"></div>
  <div id="calls-error" class="error-msg"></div>
</div>

<!-- Raw JSON -->
<div class="section" id="section-raw" style="display:none">
  <h2>🔍 Raw JSON Output</h2>
  <div id="raw-output"></div>
</div>

<script>
// ── Auth Check ────────────────────────────────────────────────
(async () => {
  const el = document.getElementById('auth-status');
  try {
    const userId = await Dashboard.getCurrentUserId();
    if (userId) {
      const profile = await Dashboard.getUserProfile();
      const name = profile.success ? profile.data.fullName : userId;
      el.className = 'status ok';
      el.textContent = `✓ Eingeloggt als: ${name} (${userId.substring(0, 8)}...)`;
    } else {
      el.className = 'status err';
      el.innerHTML = '✗ Nicht eingeloggt. <a href="login.html" style="color:#8b5cf6">→ Zum Login</a>';
    }
  } catch (e) {
    el.className = 'status err';
    el.textContent = '✗ Fehler: ' + e.message;
  }
})();

// ── KPIs ─────────────────────────────────────────────────────
async function loadKPIs() {
  const section = document.getElementById('section-kpis');
  const grid    = document.getElementById('kpi-grid');
  const errEl   = document.getElementById('kpi-error');
  section.style.display = '';
  grid.innerHTML = '<p class="loading">Lade KPIs...</p>';
  errEl.textContent = '';

  const r = await Dashboard.getKPIs();
  if (!r.success) {
    grid.innerHTML = '';
    errEl.textContent = '✗ ' + r.error + (r.details ? ' — ' + r.details : '');
    return;
  }
  const d = r.data;

  const cards = [
    { label: 'Anrufe gesamt',   value: d.calls.total,              sub: `${d.calls.inbound} inbound / ${d.calls.outbound} outbound` },
    { label: 'Abgeschlossen',   value: d.calls.completed,          sub: `${d.calls.missed} verpasst` },
    { label: 'Gesamtdauer',     value: d.duration.totalFormatted,  sub: `Ø ${d.duration.avgFormatted} / Anruf` },
    { label: 'Kosten gesamt',   value: '€' + d.cost.total,        sub: `Calls €${d.cost.calls} / SMS €${d.cost.sms}` },
    { label: 'Assistenten',     value: d.assistants.total,         sub: `${d.assistants.live} live` },
    { label: 'SMS',             value: d.sms.total,                sub: 'diesen Monat' },
    { label: 'Leads',           value: d.leads.total,              sub: 'diesen Monat' },
  ];

  grid.innerHTML = cards.map(c => `
    <div class="kpi-card">
      <div class="kpi-label">${c.label}</div>
      <div class="kpi-value">${c.value}</div>
      <div class="kpi-sub">${c.sub}</div>
    </div>
  `).join('');
}

// ── Usage Chart ───────────────────────────────────────────────
async function loadUsage() {
  const section  = document.getElementById('section-usage');
  const chartEl  = document.getElementById('bar-chart');
  const labelsEl = document.getElementById('bar-labels');
  const summaryEl= document.getElementById('usage-summary');
  const errEl    = document.getElementById('usage-error');
  section.style.display = '';
  chartEl.innerHTML = '<p class="loading">Lade Nutzungsdaten...</p>';
  errEl.textContent = '';

  const r = await Dashboard.getUsageOverTime({ days: 30 });
  if (!r.success) {
    chartEl.innerHTML = '';
    errEl.textContent = '✗ ' + r.error + (r.details ? ' — ' + r.details : '');
    return;
  }

  const { timeline, summary } = r.data;
  const maxCalls = Math.max(...timeline.map(d => d.calls), 1);

  // Show every 5th label to avoid clutter
  chartEl.innerHTML = timeline.map((d, i) => {
    const h = Math.round((d.calls / maxCalls) * 100);
    return `<div class="bar" style="height:${Math.max(h,2)}%" title="${d.date}: ${d.calls} Anrufe"></div>`;
  }).join('');

  labelsEl.innerHTML = timeline.map((d, i) =>
    `<span class="bar-label">${i % 5 === 0 ? d.label : ''}</span>`
  ).join('');

  summaryEl.textContent =
    `Gesamt: ${summary.totalCalls} Anrufe · Ø ${summary.avgCallsPerDay}/Tag · Peak: ${summary.peakCalls} am ${summary.peakDate || '–'}`;
}

// ── Call List ─────────────────────────────────────────────────
async function loadCalls() {
  const section = document.getElementById('section-calls');
  const tableEl = document.getElementById('calls-table');
  const errEl   = document.getElementById('calls-error');
  section.style.display = '';
  tableEl.innerHTML = '<p class="loading">Lade Anrufe...</p>';
  errEl.textContent = '';

  const r = await Dashboard.getCallStats({ limit: 20 });
  if (!r.success) {
    tableEl.innerHTML = '';
    errEl.textContent = '✗ ' + r.error + (r.details ? ' — ' + r.details : '');
    return;
  }

  const { calls } = r.data;
  if (calls.length === 0) {
    tableEl.innerHTML = '<p style="color:#6b6990">Keine Anrufe gefunden.</p>';
    return;
  }

  const statusBadge = s => {
    const map = { completed: 'badge-green', missed: 'badge-red', busy: 'badge-yellow', failed: 'badge-red' };
    return `<span class="badge ${map[s] || 'badge-gray'}">${s || '–'}</span>`;
  };
  const dirBadge = d =>
    `<span class="badge ${d === 'inbound' ? 'badge-green' : 'badge-yellow'}">${d || '–'}</span>`;

  tableEl.innerHTML = `
    <table>
      <thead>
        <tr>
          <th>Datum</th>
          <th>Nummer</th>
          <th>Richtung</th>
          <th>Status</th>
          <th>Dauer</th>
          <th>Kosten</th>
          <th>Transkript</th>
        </tr>
      </thead>
      <tbody>
        ${calls.map(c => `
          <tr>
            <td>${new Date(c.createdAt).toLocaleString('de-DE', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' })}</td>
            <td>${c.phoneNumber || '–'}</td>
            <td>${dirBadge(c.direction)}</td>
            <td>${statusBadge(c.status)}</td>
            <td>${c.durationFormatted}</td>
            <td>€${c.cost.toFixed(3)}</td>
            <td>${c.hasTranscript ? '✓' : '–'}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
    <p style="margin-top:0.75rem; font-size:0.78rem; color:#6b6990">${calls.length} Anrufe geladen</p>
  `;
}

// ── Raw JSON ──────────────────────────────────────────────────
async function loadRawJSON() {
  const section = document.getElementById('section-raw');
  const outEl   = document.getElementById('raw-output');
  section.style.display = '';
  outEl.innerHTML = '<pre class="loading">Lade alle Daten...</pre>';

  const [kpis, usage, calls, costs] = await Promise.all([
    Dashboard.getKPIs(),
    Dashboard.getUsageOverTime({ days: 30 }),
    Dashboard.getCallStats({ limit: 10 }),
    Dashboard.estimateCosts(),
  ]);

  const results = { kpis, usage, calls, costs };

  outEl.innerHTML = Object.entries(results).map(([key, val]) => `
    <div style="margin-bottom:1rem">
      <div style="color:#8b5cf6; font-size:0.8rem; font-weight:700; margin-bottom:0.4rem; text-transform:uppercase; letter-spacing:0.05em">${key}</div>
      <pre>${JSON.stringify(val, null, 2)}</pre>
    </div>
  `).join('');
}

// ── Run All ───────────────────────────────────────────────────
async function loadAll() {
  await Promise.all([loadKPIs(), loadUsage(), loadCalls()]);
}
</script>
</body>
</html>
