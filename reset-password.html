<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex">
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <title>Passwort zurücksetzen — Call Lana</title>
  <link rel="stylesheet" href="css/tailwind.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/design.css" />
</head>
<body class="bg-white text-gray-900 antialiased overflow-x-hidden">

  <!-- Reset Password Section -->
  <section class="bg-section-dark relative pt-28 pb-20 min-h-screen flex items-start justify-center">
    <div class="noise-overlay"></div>
    <div class="relative z-10 w-full max-w-md mx-auto px-6 py-12">

      <!-- Logo -->
      <a href="index.html">
        <img src="brand_assets/clana-icon-64.png" alt="Call Lana" class="h-16 w-auto mx-auto mb-8" />
      </a>

      <!-- Reset Card -->
      <div class="bg-dark-800/60 border border-dark-700/50 rounded-2xl p-8">

        <!-- Header -->
        <div class="text-center mb-6">
          <div class="w-12 h-12 bg-brand-400/10 rounded-full flex items-center justify-center mx-auto mb-4">
            <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
          </div>
          <h1 class="font-display text-2xl font-bold tracking-tight mb-2">
            <span class="lang-de">Neues Passwort setzen</span>
            <span class="lang-en hidden">Set new password</span>
          </h1>
          <p class="font-body text-sm text-gray-500">
            <span class="lang-de">Gib dein neues Passwort ein. Mindestens 8 Zeichen.</span>
            <span class="lang-en hidden">Enter your new password. At least 8 characters.</span>
          </p>
        </div>

        <!-- Alert -->
        <div id="alertBox" class="hidden text-sm rounded-xl px-4 py-3 mb-4"></div>

        <!-- Form -->
        <form id="resetForm" class="space-y-5" novalidate>

          <!-- New Password -->
          <div>
            <label class="block font-body text-sm font-medium text-gray-700 mb-2">
              <span class="lang-de">Neues Passwort</span>
              <span class="lang-en hidden">New password</span>
            </label>
            <div class="relative">
              <input type="password" id="pw" required class="form-input pr-12" placeholder="Mindestens 8 Zeichen" autocomplete="new-password" />
              <button type="button" onclick="togglePassword('pw', this)" class="absolute right-3 top-1/2 -translate-y-1/2 text-gray-500 hover:text-gray-700 transition-colors duration-200 focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-brand-400 rounded p-1" aria-label="Passwort anzeigen">
                <svg class="w-5 h-5 eye-open" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                <svg class="w-5 h-5 eye-closed hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.878 9.878L6.59 6.59m7.532 7.532l3.29 3.29M3 3l18 18"/></svg>
              </button>
            </div>
            <!-- Strength indicator -->
            <div class="flex gap-1 mt-2">
              <div class="flex-1 h-1 bg-gray-200 rounded" id="pb1"></div>
              <div class="flex-1 h-1 bg-gray-200 rounded" id="pb2"></div>
              <div class="flex-1 h-1 bg-gray-200 rounded" id="pb3"></div>
              <div class="flex-1 h-1 bg-gray-200 rounded" id="pb4"></div>
            </div>
            <p class="font-body text-xs text-gray-500 mt-1" id="pwLabel">
              <span class="lang-de">Passwortstärke</span>
              <span class="lang-en hidden">Password strength</span>
            </p>
            <p class="font-body text-xs text-red-400 mt-1" id="pw-err"></p>
          </div>

          <!-- Confirm Password -->
          <div>
            <label class="block font-body text-sm font-medium text-gray-700 mb-2">
              <span class="lang-de">Passwort bestätigen</span>
              <span class="lang-en hidden">Confirm password</span>
            </label>
            <input type="password" id="pw2" required class="form-input" placeholder="Passwort wiederholen" autocomplete="new-password" />
            <p class="font-body text-xs text-red-400 mt-1" id="pw2-err"></p>
          </div>

          <!-- Submit -->
          <button type="submit" id="subBtn" class="btn-brand w-full">
            <span class="lang-de">Passwort speichern</span>
            <span class="lang-en hidden">Save password</span>
          </button>
        </form>

        <!-- Back link -->
        <a href="login.html" class="block text-center font-body text-sm text-gray-500 hover:text-brand-400 transition-colors mt-6">
          <span class="lang-de">&larr; Zurück zum Login</span>
          <span class="lang-en hidden">&larr; Back to login</span>
        </a>
      </div>

    </div>
  </section>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/logger.js"></script>
  <script src="js/supabase-init.js"></script>
  <script src="js/auth.js"></script>
  <script>
    const pw = document.getElementById('pw');
    const bars = ['pb1','pb2','pb3','pb4'].map(id => document.getElementById(id));
    const strengthLabels = { de: ['Zu kurz', 'Schwach', 'Mittel', 'Stark'], en: ['Too short', 'Weak', 'Medium', 'Strong'] };
    const strengthColors = ['', 'bg-red-400', 'bg-yellow-400', 'bg-green-400'];

    pw.addEventListener('input', () => {
      const v = pw.value;
      let s = 0;
      if (v.length >= 8) s++;
      if (/[A-Z]/.test(v)) s++;
      if (/[0-9]/.test(v)) s++;
      if (/[^A-Za-z0-9]/.test(v)) s++;
      bars.forEach((b, i) => {
        b.className = 'flex-1 h-1 rounded ' + (i < s ? (strengthColors[Math.min(s, 3)]) : 'bg-gray-200');
      });
      const label = (strengthLabels.de[s] || 'Zu kurz');
      document.getElementById('pwLabel').textContent = 'Passwortstärke: ' + label;
    });

    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const eyeOpen = btn.querySelector('.eye-open');
      const eyeClosed = btn.querySelector('.eye-closed');
      if (input.type === 'password') {
        input.type = 'text';
        eyeOpen.classList.add('hidden');
        eyeClosed.classList.remove('hidden');
      } else {
        input.type = 'password';
        eyeOpen.classList.remove('hidden');
        eyeClosed.classList.add('hidden');
      }
    }

    // Check for valid session from reset link
    (async () => {
      const user = await clanaAuth.getUser();
      if (!user) {
        showAlert('Ungültiger oder abgelaufener Reset-Link. Bitte fordere einen neuen an.', 'error');
        document.getElementById('resetForm').style.display = 'none';
      }
    })();

    // Form submit
    document.getElementById('resetForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      document.getElementById('pw-err').textContent = '';
      document.getElementById('pw2-err').textContent = '';

      const password = pw.value;
      const pw2Val = document.getElementById('pw2').value;
      let valid = true;

      if (!password || password.length < 8) {
        document.getElementById('pw-err').textContent = 'Passwort muss mindestens 8 Zeichen haben.';
        valid = false;
      }
      if (password !== pw2Val) {
        document.getElementById('pw2-err').textContent = 'Passwörter stimmen nicht überein.';
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('subBtn');
      btn.disabled = true;
      btn.textContent = 'Wird gespeichert...';

      try {
        const { data, error } = await supabaseClient.auth.updateUser({ password });
        if (error) {
          showAlert('Fehler: ' + error.message, 'error');
          btn.disabled = false;
          btn.innerHTML = '<span class="lang-de">Passwort speichern</span><span class="lang-en hidden">Save password</span>';
          return;
        }
        showAlert('Passwort erfolgreich geändert! Weiterleitung zum Login...', 'success');
        document.getElementById('resetForm').style.display = 'none';
        await supabaseClient.auth.signOut();
        setTimeout(() => { window.location.href = 'login.html'; }, 2000);
      } catch (err) {
        showAlert('Ein unerwarteter Fehler ist aufgetreten. Bitte versuche es erneut.', 'error');
        btn.disabled = false;
        btn.innerHTML = '<span class="lang-de">Passwort speichern</span><span class="lang-en hidden">Save password</span>';
      }
    });

    function showAlert(message, type) {
      const box = document.getElementById('alertBox');
      box.textContent = message;
      const styles = {
        error: 'text-sm text-red-400 bg-red-400/10 border border-red-400/20 rounded-xl px-4 py-3 mb-4',
        success: 'text-sm text-green-700 bg-green-50 border border-green-200 rounded-xl px-4 py-3 mb-4',
      };
      box.className = styles[type] || styles.error;
      box.classList.remove('hidden');
    }
  </script>
<script src="i18n.js"></script>
<script src="cookie-consent.js"></script>
</body>
</html>
